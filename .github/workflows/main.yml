name: Daily Threat Intelligence Feed

on:
  schedule:
    - cron: '0 8 * * *' # 🚀 Runs automatically at 08:00 UTC every day
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 📝 Permission to save the report to your repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Threat Feed Script
      # 🌉 THE BRIDGE: This passes your GitHub Secrets into Python environment variables
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python threat_feed.py

    - name: Commit and Push Report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add DAILY_THREAT_REPORT.md
        git commit -m "Automated Threat Report Update - $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
